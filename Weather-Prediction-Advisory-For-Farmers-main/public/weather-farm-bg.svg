<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="960" y1="0" x2="960" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BEE8FF"/>
      <stop offset="1" stop-color="#E9F7FF"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="960" y1="650" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CDECC9"/>
      <stop offset="1" stop-color="#9FD39A"/>
